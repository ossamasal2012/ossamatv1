<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSSAMA TV</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d060;
    --gold-dark: #8b6914;
    --black: #050505;
    --black2: #0d0d0d;
    --black3: #161616;
    --black4: #1e1e1e;
    --black5: #2a2a2a;
    --text: #e8e0cc;
    --text-dim: #9a8a6a;
    --red: #c0392b;
    --shadow-gold: 0 0 20px rgba(201,168,76,0.25);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--black);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === HEADER === */
  header {
    background: linear-gradient(135deg, #0a0a0a 0%, #111106 50%, #0a0a0a 100%);
    border-bottom: 2px solid var(--gold-dark);
    padding: 0 24px;
    position: sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    height: 70px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.8), 0 1px 0 rgba(201,168,76,0.15);
  }
  .logo {
    font-family: 'Cinzel', serif;
    font-size: 26px;
    font-weight: 900;
    background: linear-gradient(135deg, #f0d060, #c9a84c, #8b6914, #c9a84c);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 3px;
    text-shadow: none;
    filter: drop-shadow(0 0 8px rgba(201,168,76,0.4));
  }
  .logo span { font-size:12px; display:block; letter-spacing:6px; opacity:0.7; margin-top:-4px; }
  .header-search {
    display:flex; align-items:center; gap:10px;
    background: var(--black3);
    border: 1px solid var(--gold-dark);
    border-radius: 50px;
    padding: 8px 16px;
    flex:1; max-width:320px; margin: 0 20px;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .header-search:focus-within { border-color: var(--gold); box-shadow: var(--shadow-gold); }
  .header-search input {
    background:none; border:none; outline:none;
    color: var(--text); font-family:'Cairo',sans-serif; font-size:14px;
    flex:1; text-align:right;
  }
  .header-search input::placeholder { color: var(--text-dim); }
  .search-icon { color: var(--gold); font-size:16px; }

  /* FAB Button */
  .fab {
    position: fixed; bottom:30px; left:30px;
    width:60px; height:60px; border-radius:50%;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    border:none; cursor:pointer;
    font-size:28px; color: var(--black);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 4px 20px rgba(201,168,76,0.5), 0 0 40px rgba(201,168,76,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
    z-index:200;
  }
  .fab:hover { transform: scale(1.1) rotate(45deg); box-shadow: 0 6px 30px rgba(201,168,76,0.7); }
  .fab.open { transform: rotate(45deg); }

  .fab-menu {
    position:fixed; bottom:105px; left:30px;
    display:flex; flex-direction:column; gap:12px;
    z-index:200;
    opacity:0; pointer-events:none; transform: translateY(20px);
    transition: opacity 0.3s, transform 0.3s;
  }
  .fab-menu.visible { opacity:1; pointer-events:all; transform: translateY(0); }
  .fab-item {
    display:flex; align-items:center; gap:10px;
    background: linear-gradient(135deg, var(--black3), var(--black4));
    border: 1px solid var(--gold-dark);
    border-radius: 50px;
    padding: 10px 18px;
    cursor:pointer; white-space:nowrap;
    color: var(--gold); font-family:'Cairo',sans-serif; font-weight:700; font-size:14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    transition: all 0.2s;
  }
  .fab-item:hover { background: linear-gradient(135deg, var(--gold-dark), var(--gold)); color: var(--black); border-color: var(--gold-light); }
  .fab-item-icon { font-size:18px; }

  /* === MAIN === */
  main { padding: 30px 20px; max-width: 1400px; margin: 0 auto; }

  /* Section title */
  .section-title {
    font-size: 20px; font-weight: 700; color: var(--gold);
    margin-bottom: 20px; padding-bottom: 10px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    display:flex; align-items:center; gap:10px;
  }
  .section-title::before { content:''; width:4px; height:22px; background: var(--gold); border-radius:2px; display:inline-block; }

  /* Groups Grid */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 20px; margin-bottom: 40px;
  }
  .group-card {
    background: linear-gradient(145deg, var(--black3), var(--black4));
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    overflow:hidden;
    cursor:pointer;
    transition: all 0.3s;
    position:relative;
  }
  .group-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: var(--shadow-gold); }
  .group-card-img {
    width:100%; aspect-ratio:16/9; object-fit:cover;
    background: var(--black5);
    display:flex; align-items:center; justify-content:center;
    font-size:40px; color: var(--gold-dark);
  }
  .group-card-img img { width:100%; height:100%; object-fit:cover; }
  .group-card-body { padding: 14px; }
  .group-card-name { font-weight:700; font-size:15px; color: var(--gold-light); }
  .group-card-count { font-size:12px; color: var(--text-dim); margin-top:4px; }
  .group-card-actions {
    position:absolute; top:8px; right:8px;
    display:flex; gap:6px; opacity:0; transition:opacity 0.2s;
  }
  .group-card:hover .group-card-actions { opacity:1; }
  .action-btn {
    width:30px; height:30px; border-radius:50%;
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    font-size:13px; transition: all 0.2s;
  }
  .edit-btn { background: rgba(201,168,76,0.9); color: var(--black); }
  .del-btn { background: rgba(192,57,43,0.9); color: white; }
  .edit-btn:hover { background: var(--gold-light); }
  .del-btn:hover { background: #e74c3c; }

  /* Channels Grid */
  .channels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  .channel-card {
    background: linear-gradient(145deg, var(--black3), var(--black4));
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 14px;
    overflow:hidden;
    cursor:pointer;
    transition: all 0.3s;
    position:relative;
  }
  .channel-card:hover { border-color: var(--gold); transform: translateY(-3px); box-shadow: var(--shadow-gold); }
  .channel-logo {
    width:100%; aspect-ratio:1/1; object-fit:cover;
    background: var(--black5);
    display:flex; align-items:center; justify-content:center;
    font-size:32px; color: var(--gold-dark);
  }
  .channel-logo img { width:100%; height:100%; object-fit:contain; padding:10px; background:var(--black5); }
  .channel-name { padding: 10px; font-size:13px; font-weight:600; color: var(--text); text-align:center; }
  .channel-badge {
    position:absolute; top:6px; left:6px;
    background: var(--gold); color: var(--black);
    font-size:9px; font-weight:900; padding: 2px 7px; border-radius:20px;
    letter-spacing:1px;
  }
  .channel-badge.url { background: #2980b9; color:white; }
  .channel-card-actions {
    position:absolute; top:6px; right:6px;
    display:flex; gap:4px; opacity:0; transition:opacity 0.2s;
  }
  .channel-card:hover .channel-card-actions { opacity:1; }

  /* === BREADCRUMB === */
  .breadcrumb {
    display:flex; align-items:center; gap:8px;
    margin-bottom:20px; font-size:14px; color: var(--text-dim);
  }
  .breadcrumb span { cursor:pointer; color: var(--gold); }
  .breadcrumb span:hover { text-decoration:underline; }
  .breadcrumb .sep { color: var(--text-dim); }

  /* === MODAL === */
  .modal-overlay {
    position:fixed; inset:0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    z-index:500;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; transition:opacity 0.3s;
  }
  .modal-overlay.active { opacity:1; pointer-events:all; }
  .modal {
    background: linear-gradient(145deg, var(--black2), var(--black3));
    border: 1px solid var(--gold-dark);
    border-radius: 20px;
    padding: 30px;
    width: 90%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8), var(--shadow-gold);
    transform: scale(0.9); transition: transform 0.3s;
  }
  .modal-overlay.active .modal { transform: scale(1); }
  .modal-title {
    font-size:20px; font-weight:700; color: var(--gold);
    margin-bottom:24px; display:flex; align-items:center; gap:10px;
  }
  .modal-title .icon { font-size:22px; }
  .form-group { margin-bottom:18px; }
  .form-group label { display:block; font-size:13px; color: var(--text-dim); margin-bottom:7px; font-weight:600; }
  .form-group input {
    width:100%; background: var(--black4);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius:10px; padding: 12px 14px;
    color: var(--text); font-family:'Cairo',sans-serif; font-size:14px;
    outline:none; transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
  .form-group input::placeholder { color: var(--text-dim); }
  .modal-actions { display:flex; gap:12px; margin-top:24px; }
  .btn-primary {
    flex:1; padding:12px; border:none; border-radius:10px; cursor:pointer;
    background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
    color: var(--black); font-family:'Cairo',sans-serif; font-weight:700; font-size:15px;
    transition: all 0.2s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(201,168,76,0.4); }
  .btn-cancel {
    flex:1; padding:12px; border: 1px solid var(--black5); border-radius:10px; cursor:pointer;
    background: var(--black4); color: var(--text-dim);
    font-family:'Cairo',sans-serif; font-weight:600; font-size:15px;
    transition: all 0.2s;
  }
  .btn-cancel:hover { border-color: var(--text-dim); color: var(--text); }

  /* Confirm modal */
  .confirm-text { color: var(--text); font-size:16px; margin-bottom:10px; }
  .confirm-sub { color: var(--text-dim); font-size:13px; }
  .btn-danger {
    flex:1; padding:12px; border:none; border-radius:10px; cursor:pointer;
    background: linear-gradient(135deg, #e74c3c, var(--red));
    color: white; font-family:'Cairo',sans-serif; font-weight:700; font-size:15px;
    transition: all 0.2s;
  }
  .btn-danger:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(192,57,43,0.4); }

  /* Empty state */
  .empty-state {
    text-align:center; padding: 60px 20px; color: var(--text-dim);
  }
  .empty-state .icon { font-size:60px; margin-bottom:16px; opacity:0.3; }
  .empty-state p { font-size:16px; }

  /* Decorative line */
  .deco-line {
    width:100%; height:1px;
    background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
    margin: 30px 0;
  }

  @media(max-width:600px){
    .logo { font-size:18px; }
    .header-search { max-width:160px; }
    .groups-grid { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); }
    .channels-grid { grid-template-columns: repeat(auto-fill, minmax(130px,1fr)); }
  }

  /* Notification */
  .notif {
    position:fixed; top:80px; left:50%; transform:translateX(-50%);
    background: linear-gradient(135deg, var(--black3), var(--black4));
    border: 1px solid var(--gold);
    border-radius:12px; padding:12px 24px;
    color: var(--gold); font-weight:600; font-size:14px;
    z-index:999;
    box-shadow: var(--shadow-gold);
    opacity:0; transition: opacity 0.3s;
    pointer-events:none;
  }
  .notif.show { opacity:1; }

  /* Live indicator */
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .live-dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#e74c3c; animation: pulse 1.5s infinite; margin-left:6px; }

  /* Glowing border animation */
  @keyframes borderGlow {
    0%,100% { box-shadow: 0 0 5px rgba(201,168,76,0.2); }
    50% { box-shadow: 0 0 20px rgba(201,168,76,0.5); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">OSSAMA TV<span>● LIVE STREAMING</span></div>
  <div class="header-search">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="ابحث عن قناة..." oninput="handleSearch()">
  </div>
  <div style="color:var(--gold-dark); font-size:13px; white-space:nowrap;">
    <span class="live-dot"></span> بث مباشر
  </div>
</header>

<!-- MAIN -->
<main id="mainContent">
  <!-- Dynamic content here -->
</main>

<!-- FAB -->
<button class="fab" id="fabBtn" onclick="toggleFab()">+</button>
<div class="fab-menu" id="fabMenu">
  <div class="fab-item" onclick="openAddChannel()">
    <span class="fab-item-icon">📺</span> إضافة قناة
  </div>
  <div class="fab-item" onclick="openAddGroup()">
    <span class="fab-item-icon">📦</span> إضافة مجموعة
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif" id="notif"></div>

<!-- ADD CHANNEL MODAL -->
<div class="modal-overlay" id="addChannelModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">📺</span> إضافة قناة جديدة</div>
    <div class="form-group">
      <label>اسم القناة *</label>
      <input type="text" id="chName" placeholder="مثال: قناة الجزيرة">
    </div>
    <div class="form-group">
      <label>رابط القناة * (m3u8 أو URL)</label>
      <input type="text" id="chUrl" placeholder="https://...">
    </div>
    <div class="form-group">
      <label>رابط صورة القناة</label>
      <input type="text" id="chImg" placeholder="https://... (اختياري)">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveChannel()">✅ حفظ القناة</button>
      <button class="btn-cancel" onclick="closeModal('addChannelModal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- ADD GROUP MODAL -->
<div class="modal-overlay" id="addGroupModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">📦</span> إضافة مجموعة جديدة</div>
    <div class="form-group">
      <label>اسم المجموعة *</label>
      <input type="text" id="grpName" placeholder="مثال: قنوات رياضية">
    </div>
    <div class="form-group">
      <label>رابط صورة المجموعة</label>
      <input type="text" id="grpImg" placeholder="https://... (اختياري)">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="saveGroup()">✅ حفظ المجموعة</button>
      <button class="btn-cancel" onclick="closeModal('addGroupModal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- EDIT CHANNEL MODAL -->
<div class="modal-overlay" id="editChannelModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">✏️</span> تعديل القناة</div>
    <input type="hidden" id="editChId">
    <div class="form-group">
      <label>اسم القناة *</label>
      <input type="text" id="editChName">
    </div>
    <div class="form-group">
      <label>رابط القناة *</label>
      <input type="text" id="editChUrl">
    </div>
    <div class="form-group">
      <label>رابط صورة القناة</label>
      <input type="text" id="editChImg">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="updateChannel()">💾 حفظ التعديلات</button>
      <button class="btn-cancel" onclick="closeModal('editChannelModal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- EDIT GROUP MODAL -->
<div class="modal-overlay" id="editGroupModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">✏️</span> تعديل المجموعة</div>
    <input type="hidden" id="editGrpId">
    <div class="form-group">
      <label>اسم المجموعة *</label>
      <input type="text" id="editGrpName">
    </div>
    <div class="form-group">
      <label>رابط صورة المجموعة</label>
      <input type="text" id="editGrpImg">
    </div>
    <div class="modal-actions">
      <button class="btn-primary" onclick="updateGroup()">💾 حفظ التعديلات</button>
      <button class="btn-cancel" onclick="closeModal('editGroupModal')">إلغاء</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title"><span class="icon">⚠️</span> تأكيد الحذف</div>
    <p class="confirm-text" id="confirmText">هل أنت متأكد من الحذف؟</p>
    <p class="confirm-sub">لا يمكن التراجع عن هذا الإجراء.</p>
    <div class="modal-actions" style="margin-top:20px;">
      <button class="btn-danger" onclick="executeDelete()">🗑️ حذف</button>
      <button class="btn-cancel" onclick="closeModal('confirmModal')">إلغاء</button>
    </div>
  </div>
</div>

<script>
// =========== DATA STORE ===========
const STORAGE_KEY = 'ossama_tv_data';

function getData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return { groups: [], channels: [] };
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  // Also broadcast to other tabs
  try {
    const bc = new BroadcastChannel('ossama_tv');
    bc.postMessage({ type: 'data_updated', data });
    bc.close();
  } catch(e) {}
}

// Listen for updates from other tabs
try {
  const bc = new BroadcastChannel('ossama_tv');
  bc.onmessage = (e) => {
    if (e.data.type === 'data_updated') render();
  };
} catch(e) {}

// =========== STATE ===========
let currentGroupId = null; // null = home
let fabOpen = false;
let deleteTarget = null; // {type, id}
let editingGroupId = null; // for channel modal

// =========== RENDER ===========
function render() {
  const data = getData();
  const main = document.getElementById('mainContent');

  if (currentGroupId === null) {
    // HOME: show groups + ungrouped channels
    const ungrouped = data.channels.filter(c => !c.groupId);
    let html = `<div class="section-title">📦 المجموعات</div>`;

    if (data.groups.length === 0) {
      html += `<div class="empty-state"><div class="icon">📦</div><p>لا توجد مجموعات بعد، اضغط + لإضافة مجموعة</p></div>`;
    } else {
      html += `<div class="groups-grid">`;
      data.groups.forEach(g => {
        const count = data.channels.filter(c => c.groupId === g.id).length;
        html += `
          <div class="group-card" onclick="openGroup('${g.id}')">
            <div class="group-card-img">
              ${g.img ? `<img src="${g.img}" onerror="this.parentElement.innerHTML='📦'">` : '📦'}
            </div>
            <div class="group-card-body">
              <div class="group-card-name">${escHtml(g.name)}</div>
              <div class="group-card-count">${count} قناة</div>
            </div>
            <div class="group-card-actions" onclick="event.stopPropagation()">
              <button class="action-btn edit-btn" onclick="openEditGroup('${g.id}')">✏️</button>
              <button class="action-btn del-btn" onclick="confirmDelete('group','${g.id}','${escHtml(g.name)}')">🗑️</button>
            </div>
          </div>`;
      });
      html += `</div>`;
    }

    if (ungrouped.length > 0) {
      html += `<div class="deco-line"></div>`;
      html += `<div class="section-title">📺 قنوات بدون مجموعة</div>`;
      html += `<div class="channels-grid">` + ungrouped.map(ch => channelCardHtml(ch)).join('') + `</div>`;
    }

    main.innerHTML = html;
  } else {
    // GROUP VIEW
    const group = data.groups.find(g => g.id === currentGroupId);
    if (!group) { currentGroupId = null; render(); return; }
    const channels = data.channels.filter(c => c.groupId === currentGroupId);

    let html = `
      <div class="breadcrumb">
        <span onclick="goHome()">🏠 الرئيسية</span>
        <span class="sep">›</span>
        <span style="color:var(--text)">${escHtml(group.name)}</span>
      </div>
      <div class="section-title">📺 قنوات ${escHtml(group.name)}</div>`;

    if (channels.length === 0) {
      html += `<div class="empty-state"><div class="icon">📺</div><p>لا توجد قنوات في هذه المجموعة بعد</p></div>`;
    } else {
      html += `<div class="channels-grid">` + channels.map(ch => channelCardHtml(ch)).join('') + `</div>`;
    }
    main.innerHTML = html;
  }
}

function channelCardHtml(ch) {
  const isM3u8 = ch.url && (ch.url.includes('.m3u8') || ch.url.includes('.m3u') || ch.url.toLowerCase().includes('hls'));
  return `
    <div class="channel-card" onclick="playChannel('${escHtml(ch.url)}','${encodeURIComponent(ch.name)}')">
      <div class="channel-logo">
        ${ch.img ? `<img src="${ch.img}" onerror="this.parentElement.innerHTML='📺'">` : '📺'}
      </div>
      <div class="channel-name">${escHtml(ch.name)}</div>
      <div class="channel-badge ${isM3u8 ? '' : 'url'}">${isM3u8 ? 'HLS' : 'URL'}</div>
      <div class="channel-card-actions" onclick="event.stopPropagation()">
        <button class="action-btn edit-btn" onclick="openEditChannel('${ch.id}')">✏️</button>
        <button class="action-btn del-btn" onclick="confirmDelete('channel','${ch.id}','${escHtml(ch.name)}')">🗑️</button>
      </div>
    </div>`;
}

// =========== NAVIGATION ===========
function openGroup(id) {
  currentGroupId = id;
  render();
}
function goHome() {
  currentGroupId = null;
  render();
}

// =========== FAB ===========
function toggleFab() {
  fabOpen = !fabOpen;
  document.getElementById('fabBtn').classList.toggle('open', fabOpen);
  document.getElementById('fabMenu').classList.toggle('visible', fabOpen);
}
document.addEventListener('click', e => {
  if (!e.target.closest('.fab') && !e.target.closest('.fab-menu') && fabOpen) {
    fabOpen = false;
    document.getElementById('fabBtn').classList.remove('open');
    document.getElementById('fabMenu').classList.remove('visible');
  }
});

// =========== MODALS ===========
function openModal(id) {
  document.getElementById(id).classList.add('active');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
}
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.classList.remove('active');
  });
});

function openAddChannel() {
  document.getElementById('chName').value = '';
  document.getElementById('chUrl').value = '';
  document.getElementById('chImg').value = '';
  editingGroupId = currentGroupId;
  openModal('addChannelModal');
  toggleFab();
}
function openAddGroup() {
  document.getElementById('grpName').value = '';
  document.getElementById('grpImg').value = '';
  openModal('addGroupModal');
  toggleFab();
}

// =========== ADD/EDIT/DELETE ===========
function saveChannel() {
  const name = document.getElementById('chName').value.trim();
  const url  = document.getElementById('chUrl').value.trim();
  const img  = document.getElementById('chImg').value.trim();
  if (!name || !url) { showNotif('⚠️ يرجى ملء الاسم والرابط'); return; }
  const data = getData();
  data.channels.push({ id: uid(), name, url, img, groupId: editingGroupId });
  saveData(data);
  closeModal('addChannelModal');
  render();
  showNotif('✅ تمت إضافة القناة بنجاح');
}

function saveGroup() {
  const name = document.getElementById('grpName').value.trim();
  const img  = document.getElementById('grpImg').value.trim();
  if (!name) { showNotif('⚠️ يرجى إدخال اسم المجموعة'); return; }
  const data = getData();
  data.groups.push({ id: uid(), name, img });
  saveData(data);
  closeModal('addGroupModal');
  render();
  showNotif('✅ تمت إضافة المجموعة بنجاح');
}

function openEditChannel(id) {
  const data = getData();
  const ch = data.channels.find(c => c.id === id);
  if (!ch) return;
  document.getElementById('editChId').value = id;
  document.getElementById('editChName').value = ch.name;
  document.getElementById('editChUrl').value = ch.url;
  document.getElementById('editChImg').value = ch.img || '';
  openModal('editChannelModal');
}
function updateChannel() {
  const id   = document.getElementById('editChId').value;
  const name = document.getElementById('editChName').value.trim();
  const url  = document.getElementById('editChUrl').value.trim();
  const img  = document.getElementById('editChImg').value.trim();
  if (!name || !url) { showNotif('⚠️ يرجى ملء الاسم والرابط'); return; }
  const data = getData();
  const idx = data.channels.findIndex(c => c.id === id);
  if (idx > -1) { data.channels[idx] = { ...data.channels[idx], name, url, img }; }
  saveData(data);
  closeModal('editChannelModal');
  render();
  showNotif('✅ تم تعديل القناة بنجاح');
}

function openEditGroup(id) {
  const data = getData();
  const g = data.groups.find(x => x.id === id);
  if (!g) return;
  document.getElementById('editGrpId').value = id;
  document.getElementById('editGrpName').value = g.name;
  document.getElementById('editGrpImg').value = g.img || '';
  openModal('editGroupModal');
}
function updateGroup() {
  const id   = document.getElementById('editGrpId').value;
  const name = document.getElementById('editGrpName').value.trim();
  const img  = document.getElementById('editGrpImg').value.trim();
  if (!name) { showNotif('⚠️ يرجى إدخال اسم المجموعة'); return; }
  const data = getData();
  const idx = data.groups.findIndex(g => g.id === id);
  if (idx > -1) { data.groups[idx] = { ...data.groups[idx], name, img }; }
  saveData(data);
  closeModal('editGroupModal');
  render();
  showNotif('✅ تم تعديل المجموعة بنجاح');
}

function confirmDelete(type, id, name) {
  deleteTarget = { type, id };
  document.getElementById('confirmText').textContent =
    `هل تريد حذف "${name}"؟`;
  openModal('confirmModal');
}
function executeDelete() {
  if (!deleteTarget) return;
  const data = getData();
  if (deleteTarget.type === 'group') {
    data.groups = data.groups.filter(g => g.id !== deleteTarget.id);
    data.channels = data.channels.filter(c => c.groupId !== deleteTarget.id);
    if (currentGroupId === deleteTarget.id) currentGroupId = null;
    showNotif('🗑️ تم حذف المجموعة');
  } else {
    data.channels = data.channels.filter(c => c.id !== deleteTarget.id);
    showNotif('🗑️ تم حذف القناة');
  }
  saveData(data);
  closeModal('confirmModal');
  deleteTarget = null;
  render();
}

// =========== PLAY ===========
function playChannel(url, name) {
  const decodedName = decodeURIComponent(name);
  const isM3u8 = url && (url.includes('.m3u8') || url.includes('.m3u') || url.toLowerCase().includes('hls'));

  if (isM3u8) {
    // Open HLS player
    const playerUrl = `OSSAMA_Player.html?url=${encodeURIComponent(url)}&name=${encodeURIComponent(decodedName)}`;
    window.open(playerUrl, '_blank');
  } else {
    // URL channel - open directly in new tab
    window.open(url, '_blank');
  }
}

// =========== SEARCH ===========
function handleSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { render(); return; }
  const data = getData();
  const results = data.channels.filter(c => c.name.toLowerCase().includes(q));
  const main = document.getElementById('mainContent');
  if (results.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>لا توجد نتائج لـ "${escHtml(q)}"</p></div>`;
    return;
  }
  let html = `<div class="section-title">🔍 نتائج البحث (${results.length})</div>`;
  html += `<div class="channels-grid">` + results.map(ch => channelCardHtml(ch)).join('') + `</div>`;
  main.innerHTML = html;
}

// =========== UTILS ===========
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}
function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function showNotif(msg) {
  const n = document.getElementById('notif');
  n.textContent = msg;
  n.classList.add('show');
  setTimeout(() => n.classList.remove('show'), 3000);
}

// =========== INIT ===========
render();
</script>
